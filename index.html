<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Say Yes 😄</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 100px;
    }
    button {
      padding: 15px 25px;
      font-size: 16px;
      margin: 10px;
      cursor: pointer;
      position: absolute;
    }
    #yesBtn {
      position: static;
      background-color: #4CAF50;
      color: white;
    }
    #noBtn {
      background-color: #f44336;
      color: white;
    }
  </style>
</head>
<body>

  <h1>Will you say YES to a great weekend? 😄</h1>

  <button id="yesBtn" onclick="sayYes()">Yes 👍</button>
  <button id="noBtn">No 😅</button>

  <script>
    const noBtn = document.getElementById("noBtn");

    document.addEventListener("mousemove", function(e) {
      const rect = noBtn.getBoundingClientRect();
      const distance = Math.hypot(
        e.clientX - (rect.left + rect.width / 2),
        e.clientY - (rect.top + rect.height / 2)
      );

      if (distance < 100) {
        const x = Math.random() * (window.innerWidth - rect.width);
        const y = Math.random() * (window.innerHeight - rect.height);
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
      }
    });

    function sayYes() {
      alert("YESSS! Enjoy your weekend! 🎉");
    }
  </script>

</body>
</html>
